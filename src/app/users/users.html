<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Users</h2>
  <button class="btn btn-danger" (click)="addUser()"> + </button>
</div>
<div class="card shadow-lg p-3">
  <table class="table table-hover table-striped align-middle text-center">
    <thead class=" table-dark">
      <tr>
        <th>#</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Phone Number</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of users; let i = index">
        <td>{{i + 1}}</td>
        <td>{{u.firstname}}</td>
        <td>{{u.lastname}}</td>
        <td>{{u.email}}</td>
        <td>{{u.phonenumber}}</td>
      </tr>
    </tbody>
</table>
</div>
