<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title> Add User</mat-card-title>
  
  </mat-card-header>
  <mat-card-content>
    <div class="example-container">
  <form >
  

    <div class="row">
    <div class="col">
       <div class="example-form-fields">
      <mat-form-field>
        <input matInput placeholder="First Name"  [(ngModel)]="firstname" name="firstname" required />
      </mat-form-field>
    </div>
    </div>
    <div class="col">
       <div class="example-form-fields">
      <mat-form-field>
        <input matInput placeholder="Last Name" [(ngModel)]="lastname" name="lastname" required />
      </mat-form-field>
    </div>
    </div>
    <div class="col">
       <div class="example-form-fields">
      <mat-form-field>
        <input matInput placeholder="Email" [(ngModel)]="email" name="email" required />
      </mat-form-field>
    </div>
    </div>
    <div class="col">
       <div class="example-form-fields">
      <mat-form-field>
        <input matInput placeholder="Phone Number" [(ngModel)]="phonenumber" name="phonenumber" required />
      </mat-form-field>
    </div>
    </div>
    </div>
    <div class="mt-4 d-flex justify-content-end gap-2">
      <button class="btn btn-danger" (click)="addUser()">Save</button>
      <button class="btn btn-secondary" (click)="toggleForm()">Cancel</button>
    </div>
 <!-- </mat-card-content>
</mat-card> -->

    
    
  </form>
</div>
