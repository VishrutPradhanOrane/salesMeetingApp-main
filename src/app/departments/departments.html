<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Departments</h2>
  <button class="btn btn-danger" (click)="addDepartment()">
    +
  </button>
</div>
<div class="container-fluid p-0 m-0">
  <div class="card shadow-lg w-100 vh-100">

    <div class="card-body p-0">
      <table class="table table-hover table-striped align-middle text-center mb-0 w-100">

        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Department Name</th>
            <th>Description</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let d of departments; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ d.departmentName }}</td>
            <td>{{ d.description }}</td>
          </tr>
        </tbody>

      </table>
    </div>

  </div>
</div>
